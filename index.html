<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Test Website for jenkins</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.12);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,.3);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #4f46e5;
            font-size: 1rem;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #f3f4f6;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 Docker is Working!</h1>
    <p>Your Nginx container is serving this website successfully.</p>
    <button onclick="alert('Hello from Docker!')">
        Test JavaScript
    </button>
</div>

</body>
</html>
